# Curated seed dataset for the Open-Meteo Weather API.
# Each record is a (lat, lon) pair plus optional time-window for archive/forecast.
# Reusable for /forecast, /archive, /elevation, /marine, /air-quality, /flood,
# /ensemble, /seasonal, /climate — all of which take latitude+longitude.

records:
  - city:        Berlin
    latitude:    52.52
    longitude:   13.41
    timezone:    Europe/Berlin
    start_date:  "2025-01-01"
    end_date:    "2025-01-07"

  - city:        Tokyo
