[flake8]
max-line-length = 100
exclude =
    .git,
    __pycache__,
    .venv,
    venv,
    .mypy_cache,
    .pytest_cache,
    allure-results,
    reports,
    .github,
    build,
    dist,
    *.egg-info,
    .claude/skills
per-file-ignores =
    src/validators.py: E501
    tests/*_generated_*.py: E501,E303,W391

[mypy]
python_version = 3.11
strict = true
ignore_missing_imports = false
show_error_codes = true
pretty = true
exclude = (^|/)(\.venv|venv|\.mypy_cache|\.pytest_cache|allure-results|reports|build|dist)/
