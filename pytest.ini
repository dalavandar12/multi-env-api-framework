[pytest]
timeout = 60
addopts = -v --tb=short

markers =
    countries: tests targeting the REST Countries API environment
    weather: tests targeting the Open-Meteo weather API environment
    cross-env: Countries → Weather workflow tests (use --env cross-env)
    smoke: fast subset suitable for CI gate checks
    regression: full regression suite

log_cli = true
log_cli_level = INFO
log_format = %(asctime)s.%(msecs)03d - %(name)s - %(levelname)s - %(message)s
log_date_format = %Y-%m-%d %H:%M:%S

filterwarnings =
    ignore::urllib3.exceptions.InsecureRequestWarning
